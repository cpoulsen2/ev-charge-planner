name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # brands/topics kræves kun for optagelse i HACS' officielle store,
          # ikke for en personlig custom-repo. Spring dem over i CI.
          ignore: brands topics

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
