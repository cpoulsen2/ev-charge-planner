name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

# Bemærk: HACS' egen "store"-validering (hacs/action) er fjernet med vilje.
# Den er kun relevant for optagelse i den OFFICIELLE HACS-butik (kræver bl.a.
# publicerede GitHub Releases + brand-assets i home-assistant/brands). For en
# personlig custom-repo installeres integrationen fint uden den. Hassfest her
# er Home Assistants egen manifest/kode-validering og er den relevante gate.
jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
